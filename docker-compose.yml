services:
  postgres:
    image: postgres:16-alpine
    container_name: refugia_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-refugiauser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-refugiapassword}
      POSTGRES_DB: ${POSTGRES_DB:-refugia}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-refugiauser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: refugia_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-refugiauser}:${POSTGRES_PASSWORD:-refugiapassword}@postgres:5432/${POSTGRES_DB:-refugia}
    env_file:
      - .env
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: refugia_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
